# infra/docker-compose.yml
name: tdk-payment-infra
services:
  postgres:
    image: postgres:16-alpine
    container_name: tdk_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: tdk_telecom
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
volumes:
  pg_data: